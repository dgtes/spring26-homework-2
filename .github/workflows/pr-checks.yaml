name: Checks for Pull Requests for homework-2

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - master
      - develop

jobs:
  check-issue-link:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run ShellCheck
        run: |
          echo "Running ShellCheck on all shell scripts..."
          find . -type f \( -name "*.sh" -o -name "*.bash" \) -print0 | while IFS= read -r -d '' script; do
            echo "Checking: $script"
            shellcheck --severity=error "$script"
          done

          # Also check for shell scripts without extensions (check shebang)
          find . -type f -executable -print0 | while IFS= read -r -d '' file; do
            if head -n 1 "$file" | grep -qE '^#!/bin/(bash|sh)'; then
              echo "Checking: $file"
              shellcheck --severity=error "$file"
            fi
          done

          echo "✓ ShellCheck completed successfully"

      - name: Check commits for GitHub issue links
        run: |
          echo "Checking commits for GitHub issue references..."

          # Get the list of commits to check
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            COMMITS=$(git log --format=%H ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            # For push events, check the pushed commits
            COMMITS=$(git log --format=%H ${{ github.event.before }}..${{ github.event.after }})
          fi

          FAILED=0

          for commit in $COMMITS; do
            MESSAGE=$(git log --format=%B -n 1 $commit)

            # Check for GitHub issue references (#123, GH-123, or full URLs)
            if echo "$MESSAGE" | grep -qE '(#[0-9]+|GH-[0-9]+|https?://github\.com/[^/]+/[^/]+/issues/[0-9]+)'; then
              echo "✓ Commit $commit contains GitHub issue reference"
            else
              echo "✗ Commit $commit does NOT contain GitHub issue reference"
              echo "  Message: $(echo "$MESSAGE" | head -n 1)"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "======================================"
            echo "ERROR: One or more commits missing GitHub issue links"
            echo "======================================"
            echo ""
            echo "All commits must reference a GitHub issue using one of:"
            echo "  - #123 (issue number)"
            echo "  - GH-123 (GitHub issue prefix)"
            echo "  - https://github.com/owner/repo/issues/123 (full URL)"
            echo ""
            exit 1
          fi

          echo ""
          echo "✓ All commits contain GitHub issue references"
